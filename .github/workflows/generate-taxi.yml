name: generate-taxi
run-name: "generate-taxi from ${{ github.ref_name }}"
concurrency:
  group: taxi-packages-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/se-*'
      - 'app/templates/taxi/**'
      - 'app/templates/meta.toml'
      - 'app/products/taxi.js'
      - '.github/workflows/generate-taxi.yml'
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip tests'
        type: boolean
        default: false
      skip-generation:
        description: 'Skip generation'
        type: boolean
        default: false
      skip-reconciliation:
        description: 'Skip reconciliation'
        type: boolean
        default: false
      skip-commit:
        description: 'Skip commit'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  params:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: "github.event_name=[${{ github.event_name }}]"
        run: ":"
      - name: "github.ref=[${{ github.ref }}]"
        run: ":"
      - name: "inputs.skip-tests=[${{ inputs.skip-tests }}]"
        run: ":"
      - name: "inputs.skip-generation=[${{ inputs.skip-generation }}]"
        run: ":"
      - name: "inputs.skip-reconciliation=[${{ inputs.skip-reconciliation }}]"
        run: ":"
      - name: "inputs.skip-commit=[${{ inputs.skip-commit }}]"
        run: ":"
      - name: Normalise Params
        id: normalise
        shell: bash
        run: |
          SKIP_TESTS='${{ inputs.skip-tests }}'; [[ -z "$SKIP_TESTS" ]] && SKIP_TESTS="false"
          echo "skip-tests=${SKIP_TESTS}" | tee -a "$GITHUB_OUTPUT"
          SKIP_GENERATION='${{ inputs.skip-generation }}'; [[ -z "$SKIP_GENERATION" ]] && SKIP_GENERATION="false"
          echo "skip-generation=${SKIP_GENERATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_RECONCILIATION='${{ inputs.skip-reconciliation }}'; [[ -z "$SKIP_RECONCILIATION" ]] && SKIP_RECONCILIATION="false"
          echo "skip-reconciliation=${SKIP_RECONCILIATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_COMMIT='${{ inputs.skip-commit }}'; [[ -z "$SKIP_COMMIT" ]] && SKIP_COMMIT="false"
          echo "skip-commit=${SKIP_COMMIT}" | tee -a "$GITHUB_OUTPUT"
    outputs:
      skip-tests: ${{ steps.normalise.outputs.skip-tests }}
      skip-generation: ${{ steps.normalise.outputs.skip-generation }}
      skip-reconciliation: ${{ steps.normalise.outputs.skip-reconciliation }}
      skip-commit: ${{ steps.normalise.outputs.skip-commit }}

  test:
    runs-on: ubuntu-24.04
    needs: [params]
    if: ${{ needs.params.outputs.skip-tests != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build:sitemaps
      - run: npm test

  generate-se-2020-2021:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2020-2021
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2020-2021
          retention-days: 1
          path: packages-generated/

  generate-se-2021-2022:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2021-2022
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2021-2022
          retention-days: 1
          path: packages-generated/

  generate-se-2022-2023:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2022-2023
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2022-2023
          retention-days: 1
          path: packages-generated/

  generate-se-2023-2024:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2023-2024
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2023-2024
          retention-days: 1
          path: packages-generated/

  generate-se-2024-2025:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2024-2025
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2024-2025
          retention-days: 1
          path: packages-generated/

  generate-se-2025-2026:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2025-2026
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2025-2026
          retention-days: 1
          path: packages-generated/

  generate-se-2026-2027:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - run: rm -rf packages-generated
      - run: npm run generate -- --package taxi --years se-2026-2027
      - run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2026-2027
          retention-days: 1
          path: packages-generated/

  reconcile:
    runs-on: ubuntu-24.04
    needs: [params, generate-se-2020-2021, generate-se-2021-2022, generate-se-2022-2023, generate-se-2023-2024, generate-se-2024-2025, generate-se-2025-2026, generate-se-2026-2027]
    if: ${{ !cancelled() && needs.params.outputs.skip-reconciliation != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libreoffice-calc
      - uses: actions/download-artifact@v8
        with:
          pattern: taxi-se-*
          path: packages-generated/
          merge-multiple: true
      - run: npm run reconciliation -- --package taxi
      - name: Generate empty screenshots
        run: |
          mkdir -p /tmp/screenshots
          for xlsx in packages-generated/*/Financialaccountsyearto*.xlsx; do
            [ -f "$xlsx" ] || continue
            base=$(basename "$xlsx" .xlsx)
            dir=$(basename "$(dirname "$xlsx")" | sed "s/ /_/g")
            libreoffice --headless --norestore --calc \
              -env:UserInstallation="file:///tmp/lo_empty_$$" \
              --convert-to pdf --outdir /tmp/screenshots/ "$xlsx" 2>/dev/null || true
            pdf="/tmp/screenshots/${base}.pdf"
            [ -f "$pdf" ] && mv "$pdf" "reports/${dir}_empty.pdf"
          done
      - name: Generate scenario screenshots
        run: |
          mkdir -p /tmp/screenshots
          for xlsx in reports/populated/*.xlsx; do
            [ -f "$xlsx" ] || continue
            name=$(basename "$xlsx" .xlsx)
            libreoffice --headless --norestore --calc \
              -env:UserInstallation="file:///tmp/lo_pop_$$" \
              --convert-to pdf --outdir /tmp/screenshots/ "$xlsx" 2>/dev/null || true
            pdf="/tmp/screenshots/${name}.pdf"
            [ -f "$pdf" ] && mv "$pdf" "reports/${name}.pdf"
          done
      - run: rm -rf reports/populated
      - name: Check compliance
        run: |
          FAIL=0
          for f in reports/*.md; do
            if grep "^Status:" "$f" | grep -q "ANOMALYDETECTED"; then FAIL=1; fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Reconciliation found anomalies in reconciliation"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-reports
          retention-days: 1
          path: reports/

  commit:
    runs-on: ubuntu-24.04
    needs: [params, reconcile]
    if: ${{ !cancelled() && (needs.reconcile.result == 'success' || needs.reconcile.result == 'skipped') && needs.params.outputs.skip-commit != 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: taxi-se-*
          path: packages-generated/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: taxi-reports
          path: reports/
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf --ignore-unmatch reports/screenshots/ reports/populated/
          git add packages-generated/ reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git diff --staged --name-only | head -50
            git commit -m "Generate Taxi Driver packages from app/data and app/templates

          Triggered by: ${{ github.sha }}"
            git pull --rebase
            git push
          fi
