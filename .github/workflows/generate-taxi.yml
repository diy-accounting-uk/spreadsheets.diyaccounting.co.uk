      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2026-2027
          retention-days: 1
          path: packages-generated/

  commit:
    runs-on: ubuntu-24.04
    needs: [generate-se-2020-2021, generate-se-2021-2022, generate-se-2022-2023, generate-se-2023-2024, generate-se-2024-2025, generate-se-2025-2026, generate-se-2026-2027]
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all generated packages
        uses: actions/download-artifact@v8
        with:
          pattern: taxi-*
          path: packages-generated/
          merge-multiple: true

      - name: List all packages
        run: |
          echo "=== Final package contents ==="
          find packages-generated/ -type d | while read dir; do
            count=$(find "$dir" -maxdepth 1 -type f | wc -l)
            if [ "$count" -gt 0 ]; then
              echo ""
              echo "--- $dir ($count files) ---"
              ls -lh "$dir"
            fi
          done
          echo ""
          echo "=== Total files ==="
          find packages-generated/ -type f | wc -l | xargs echo "Total:"

      - name: Stage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages-generated/
          echo "=== Staged changes ==="
          git diff --staged --stat
          echo ""
          echo "=== Staged files ==="
          git diff --staged --name-only | head -50

      - name: Commit and push
        run: |
          if git diff --staged --quiet; then
            echo "=== No changes to commit ==="
            echo "packages-generated/ is already up to date"
          else
            echo "=== Committing ==="
            git commit -m "Generate Taxi Driver packages from app/data and app/templates

          Triggered by: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"
            echo ""
            echo "=== Commit details ==="
            git log -1 --stat
            echo ""
            echo "=== Pushing to ${{ github.ref_name }} ==="
            git pull --rebase
            git push
            echo "=== Push complete ==="
          fi
