name: generate-taxi
run-name: "generate-taxi from ${{ github.ref_name }}"
concurrency:
  group: taxi-packages-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/se-*'
      - 'app/templates/taxi/**'
      - 'app/templates/meta.toml'
      - 'app/lib/generator.js'
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip pre-generate tests'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  test:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip-tests }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sitemaps
        run: npm run build:sitemaps

      - name: Run tests
        run: |
          echo "=== Running all tests ==="
          npm test
          echo "=== Tests passed ==="

  generate-se-2020-2021:
    runs-on: ubuntu-24.04
    needs: [test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc
          pip install weasyprint
      - name: Clean packages-generated
        run: rm -rf packages-generated
      - name: Generate taxi se-2020-2021
        run: |
          echo "=== Generating Taxi Driver for se-2020-2021 ==="
          npm run generate -- --package taxi --years se-2020-2021
          echo "=== Generated files ==="
          find packages-generated/ -type f -exec ls -lh {} \;
      - uses: actions/upload-artifact@v7
        with:
          name: taxi-se-2020-2021
          retention-days: 1
          path: packages-generated/

  generate-se-2021-2022:
    runs-on: ubuntu-24.04
    needs: [test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
