name: generate
run-name: "generate from ${{ github.ref_name }}"

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/**'
      - 'app/templates/**'
      - 'app/lib/**'
      - 'app/bin/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  generate:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate packages
        run: npm run build

      - name: Commit generated packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages-generated/
          if git diff --staged --quiet; then
            echo "No changes to packages-generated/"
          else
            git commit -m "Generate packages from app/data and app/templates

          Triggered by: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"
            git push
          fi
