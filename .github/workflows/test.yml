name: test
run-name: "test from ${{ github.ref_name }}"

on:
  schedule:
    - cron: '47 1,2,6 * * *'
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/**'
      - 'infra/**'
      - 'behaviour-tests/**'
      - 'web/**'
      - 'packages/**'
      - 'packages/**'
      - 'scripts/**'
      - '**/cdk.json'
      - 'LICENSE'
      - 'package.json'
      - 'package-lock.json'
      - 'pom.xml'
      - '.github/workflows/test.yml'
      - '.prettierignore'
      - '.prettierrc'
      - 'eslint.config.js'
      - 'playwright.config.js'
      - 'vitest.config.js'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '24'

jobs:

  formatting:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Check formatting (JS/YAML/JSON)
        run: npx prettier --check .

  build:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Generate latest BST package
        run: |
          LATEST=$(ls app/data/se-*.toml | sort | tail -1 | xargs basename -s .toml)
          echo "Generating: $LATEST"
          npm run generate -- --package bst --years "$LATEST"

  deployment:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Build spreadsheets redirects
        run: npm run build:redirects

      - name: Build sitemaps
        run: npm run build:sitemaps

      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Maven verify (skip tests)
        run: ./mvnw --errors clean verify -DskipTests -Dmaven.compiler.source=${{ env.JAVA_VERSION }} -Dmaven.compiler.target=${{ env.JAVA_VERSION }}

      - name: CDK synth
        run: npm run cdk:synth

  infra-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Maven verify
        run: ./mvnw --errors clean verify -Dmaven.compiler.source=${{ env.JAVA_VERSION }} -Dmaven.compiler.target=${{ env.JAVA_VERSION }}

  app-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Run tests
        run: npm test

  sheets-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libreoffice-calc

      - name: Run slow tests (LibreOffice)
        run: npm run test:slow

  browser-test:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y zip
          npm ci --ignore-scripts || sleep 30 && npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Run browser tests
        run: npm run test:browser

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-results
          retention-days: 7
          path: target/browser-test-results/

  behaviour-test:
    name: 'behaviour test (local)'
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y zip
          npm ci --ignore-scripts || sleep 30 && npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build packages (zips + catalogue)
        run: npm run build:packages -- --years 2

      - name: Build sitemaps
        run: npm run build:sitemaps

      - name: Symlink zips into public directory
        run: ln -sfn ../../../target/zips web/spreadsheets.diyaccounting.co.uk/public/zips

      - name: Start local server
        run: |
          nohup npx http-server web/spreadsheets.diyaccounting.co.uk/public -p 3000 > /tmp/http-server.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run spreadsheets behaviour tests
        run: npm run test:spreadsheetsBehaviour-local

      - name: Show server logs
        if: ${{ !cancelled() }}
        run: cat /tmp/http-server.log 2>/dev/null || echo "No server log found"

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: behaviour-test-local
          retention-days: 7
          path: target/behaviour-test-results/

  reconciliation-check:
    name: 'check reconciliation reports'
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - uses: actions/checkout@v6
      - name: Check all reports are RECONCILES
        run: |
          if [ ! -d reports ] || [ -z "$(ls reports/*.md 2>/dev/null)" ]; then
            echo "::error::No reconciliation reports found in reports/"
            exit 1
          fi
          echo "=== Reconciliation Reports ==="
          FAIL=0
          for f in reports/*.md; do
            status=$(grep "^Status:" "$f" | head -1)
            echo "  $(basename "$f"): $status"
            if echo "$status" | grep -q "ANOMALYDETECTED"; then
              FAIL=1
            fi
          done
          echo ""
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Reconciliation reports contain ANOMALYDETECTED packages"
            exit 1
          fi
          echo "All reconciliation reports are RECONCILES"
