name: test
run-name: "test from ${{ github.ref_name }}"

on:
  schedule:
    - cron: '47 1,2,6 * * *'
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/**'
      - 'infra/**'
      - 'behaviour-tests/**'
      - 'web/**'
      - 'packages/**'
      - 'packages/**'
      - 'scripts/**'
      - '**/cdk.json'
      - 'LICENSE'
      - 'package.json'
      - 'package-lock.json'
      - 'pom.xml'
      - '.github/workflows/test.yml'
      - '.prettierignore'
      - '.prettierrc'
      - 'eslint.config.js'
      - 'playwright.config.js'
      - 'vitest.config.js'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '24'

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Generate latest BST package
        run: |
          LATEST=$(ls app/data/se-*.toml | sort | tail -1 | xargs basename -s .toml)
          echo "Generating: $LATEST"
          npm run generate -- --package bst --years "$LATEST"

  deployment:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Build spreadsheets redirects
        run: npm run build:redirects

      - name: Build sitemaps
        run: npm run build:sitemaps

      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Maven verify (skip tests)
        run: ./mvnw --errors clean verify -DskipTests -Dmaven.compiler.source=${{ env.JAVA_VERSION }} -Dmaven.compiler.target=${{ env.JAVA_VERSION }}

      - name: CDK synth
        run: npm run cdk:synth

  infra-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Maven verify
        run: ./mvnw --errors clean verify -Dmaven.compiler.source=${{ env.JAVA_VERSION }} -Dmaven.compiler.target=${{ env.JAVA_VERSION }}

  app-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LibreOffice Calc
        if: ${{ !cancelled() }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libreoffice-calc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Verify scenario fixtures in sync with master data
        run: npm run extract-scenarios && git diff --exit-code app/test/fixtures/

      - name: Run tests
        run: npm test

  roundtrip-bst:
    name: 'roundtrip fidelity (BST)'
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LibreOffice Calc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libreoffice-calc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Generate BST package from diya-gl data
        run: npm run generate -- --package bst --years se-2025-2026 --year-end 2026-04-05 --data examples/precision-code-ltd/bst --output-dir target/bst-pkg --skip-guide

      - name: Extract reports from Excel package
        run: npm run report -- --package bst --source-dir target/bst-pkg --output-dir target/bst-excel-reports

      - name: Compute reports from diya-gl via JS engine
        run: npm run report -- --package bst --data examples/precision-code-ltd/bst --years se-2025-2026 --output-dir target/bst-diya-gl-reports

      - name: Export diya-gl data from Excel package
        run: npm run export -- --package bst --source-dir target/bst-pkg --output-dir target/bst-exported-data

      - name: 'Equivalence 1: Excel reports == JS reports (informational)'
        continue-on-error: true
        run: diff -r target/bst-excel-reports target/bst-diya-gl-reports

      - name: 'Double-roundtrip: re-generate from exported data'
        run: npm run generate -- --package bst --years se-2025-2026 --year-end 2026-04-05 --data target/bst-exported-data --output-dir target/bst-pkg2 --skip-guide

      - name: 'Double-roundtrip: re-export'
        run: npm run export -- --package bst --source-dir target/bst-pkg2 --output-dir target/bst-exported-data2

      - name: 'Double-roundtrip: pass 2 == pass 1 (MUST PASS)'
        run: diff target/bst-exported-data/lines.jsonl target/bst-exported-data2/lines.jsonl

  roundtrip-se:
    name: 'roundtrip fidelity (SE)'
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LibreOffice Calc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libreoffice-calc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Generate SE package from diya-gl data
        run: npm run generate -- --package se --years se-2025-2026 --year-end 2026-04-05 --data examples/precision-code-ltd/advanced --output-dir target/se-pkg --skip-guide

      - name: Extract reports from Excel package
        run: npm run report -- --package se --source-dir target/se-pkg --output-dir target/se-excel-reports

      - name: Compute reports from diya-gl via JS engine
        run: npm run report -- --package se --data examples/precision-code-ltd/advanced --years se-2025-2026 --output-dir target/se-diya-gl-reports

      - name: Export diya-gl data from Excel package
        run: npm run export -- --package se --source-dir target/se-pkg --output-dir target/se-exported-data

      - name: 'Equivalence 1: Excel reports == JS reports (informational)'
        continue-on-error: true
        run: diff -r target/se-excel-reports target/se-diya-gl-reports

      - name: 'Double-roundtrip: re-generate from exported data'
        run: npm run generate -- --package se --years se-2025-2026 --year-end 2026-04-05 --data target/se-exported-data --output-dir target/se-pkg2 --skip-guide

      - name: 'Double-roundtrip: re-export'
        run: npm run export -- --package se --source-dir target/se-pkg2 --output-dir target/se-exported-data2

      - name: 'Double-roundtrip: pass 2 == pass 1 (MUST PASS)'
        run: diff target/se-exported-data/lines.jsonl target/se-exported-data2/lines.jsonl

  roundtrip-ltd:
    name: 'roundtrip fidelity (Ltd)'
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LibreOffice Calc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libreoffice-calc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Generate Ltd package from diya-gl data with offset
        run: npm run generate -- --package ltd --years ltd-2024 --year-end 2025-03-31 --data examples/precision-code-ltd/full --offset '-P1Y' --output-dir target/ltd-pkg --skip-guide

      - name: Extract reports from Excel package
        run: npm run report -- --package ltd --source-dir target/ltd-pkg --output-dir target/ltd-excel-reports

      - name: Compute reports from diya-gl via JS engine
        run: npm run report -- --package ltd --data examples/precision-code-ltd/full --offset '-P1Y' --years ltd-2024 --output-dir target/ltd-diya-gl-reports

      - name: Export diya-gl data from Excel package
        run: npm run export -- --package ltd --source-dir target/ltd-pkg --output-dir target/ltd-exported-data

      - name: 'Equivalence 1: Excel reports == JS reports (informational)'
        continue-on-error: true
        run: diff -r target/ltd-excel-reports target/ltd-diya-gl-reports

      - name: 'Double-roundtrip: re-generate from exported data'
        run: npm run generate -- --package ltd --years ltd-2024 --year-end 2025-03-31 --data target/ltd-exported-data --output-dir target/ltd-pkg2 --skip-guide

      - name: 'Double-roundtrip: re-export'
        run: npm run export -- --package ltd --source-dir target/ltd-pkg2 --output-dir target/ltd-exported-data2

      - name: 'Double-roundtrip: pass 2 == pass 1 (MUST PASS)'
        run: diff target/ltd-exported-data/lines.jsonl target/ltd-exported-data2/lines.jsonl

  browser-test:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:browser

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-results
          retention-days: 7
          path: target/browser-test-results/

  behaviour-test:
    name: 'behaviour test (local)'
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || sleep 30 && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build packages (zips + catalogue)
        run: npm run build:packages -- --years 2

      - name: Build sitemaps
        run: npm run build:sitemaps

      - name: Symlink zips into public directory
        run: ln -sfn ../../../target/zips web/spreadsheets.diyaccounting.co.uk/public/zips

      - name: Start local server
        run: |
          nohup npx http-server web/spreadsheets.diyaccounting.co.uk/public -p 3000 > /tmp/http-server.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run spreadsheets behaviour tests
        run: npm run test:spreadsheetsBehaviour-local

      - name: Show server logs
        if: ${{ !cancelled() }}
        run: cat /tmp/http-server.log 2>/dev/null || echo "No server log found"

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: behaviour-test-local
          retention-days: 7
          path: target/behaviour-test-results/

  reconciliation-check:
    name: 'check reconciliation reports'
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - uses: actions/checkout@v6
      - name: Check all reports are RECONCILES
        run: |
          if [ ! -d reports ] || [ -z "$(ls reports/*.md 2>/dev/null)" ]; then
            echo "::error::No reconciliation reports found in reports/"
            exit 1
          fi
          echo "=== Reconciliation Reports ==="
          FAIL=0
          for f in reports/*.md; do
            status=$(grep "^Status:" "$f" | head -1)
            echo "  $(basename "$f"): $status"
            if echo "$status" | grep -q "ANOMALYDETECTED"; then
              FAIL=1
            fi
          done
          echo ""
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Reconciliation reports contain ANOMALYDETECTED packages"
            exit 1
          fi
          echo "All reconciliation reports are RECONCILES"
