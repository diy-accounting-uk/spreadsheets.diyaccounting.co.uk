name: generate-bst
run-name: "generate-bst from ${{ github.ref_name }}"

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/se-*'
      - 'app/templates/bst/**'
      - 'app/templates/meta.toml'
      #- 'app/lib/**'
      #- 'app/bin/**'
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip pre-generate tests'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  discover:
    runs-on: ubuntu-24.04
    outputs:
      years: ${{ steps.list.outputs.years }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: List tax data files
        run: |
          echo "=== Tax data files found ==="
          ls -la app/data/se-*.toml
          echo ""
          echo "=== Template files ==="
          ls -la app/templates/bst/
          echo ""
          echo "=== Shared metadata ==="
          cat app/templates/meta.toml
          echo ""
          echo "=== BST metadata ==="
          cat app/templates/bst/meta.toml

      - name: Build tax year matrix
        id: list
        run: |
          echo "=== Discovering tax years for matrix ==="
          years=$(ls app/data/se-*.toml | xargs -I{} basename {} .toml | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "years=$years" >> "$GITHUB_OUTPUT"
          echo "Matrix years: $years"
          echo "Total: $(echo "$years" | jq 'length') tax years will generate concurrently"

  test:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip-tests }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sitemaps
        run: node scripts/build-sitemaps.cjs

      - name: Run tests
        run: |
          echo "=== Running all tests ==="
          npm test
          echo "=== Tests passed ==="

  guide:
    runs-on: ubuntu-24.04
    needs: [test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup pandoc
        uses: pandoc/actions/setup@v1

      - name: Install weasyprint
        run: |
          echo "=== Installing weasyprint ==="
          pip install weasyprint
          pandoc --version | head -1
          weasyprint --version

      - name: Generate guide PDF
        run: |
          echo "=== Generating BST user guide ==="
          GUIDE_EPOCH=$(git log -1 --format=%ct -- app/templates/bst/bst-guide.md)
          echo "Source markdown: app/templates/bst/bst-guide.md"
          echo "SOURCE_DATE_EPOCH: $GUIDE_EPOCH ($(date -d @$GUIDE_EPOCH --iso-8601=seconds 2>/dev/null || date -r $GUIDE_EPOCH '+%Y-%m-%dT%H:%M:%S'))"
          mkdir -p target/guide
          SOURCE_DATE_EPOCH="$GUIDE_EPOCH" pandoc app/templates/bst/bst-guide.md -o target/guide/bst-guide.pdf --pdf-engine=weasyprint
          echo ""
          echo "=== Generated guide ==="
          ls -lh target/guide/bst-guide.pdf
          md5sum target/guide/bst-guide.pdf

      - name: Upload guide artifact
        uses: actions/upload-artifact@v7
        with:
          name: bst-guide
          retention-days: 1
          path: target/guide/bst-guide.pdf

  generate:
    runs-on: ubuntu-24.04
    needs: [discover, test]
    if: ${{ !cancelled() && needs.discover.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    strategy:
      matrix:
        year: ${{ fromJson(needs.discover.outputs.years) }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show inputs for ${{ matrix.year }}
        run: |
          echo "=== Generation inputs ==="
          echo "Package:       bst (Basic Sole Trader)"
          echo "Tax data file: app/data/${{ matrix.year }}.toml"
          echo "Template:      app/templates/bst/bst-excel.xlsx"
          echo ""
          echo "=== Tax data contents ==="
          cat "app/data/${{ matrix.year }}.toml"

      - name: Generate bst spreadsheet ${{ matrix.year }}
        run: |
          echo "=== Generating Basic Sole Trader spreadsheet for ${{ matrix.year }} ==="
          node app/bin/generate.js --package bst --years ${{ matrix.year }}
          echo ""
          echo "=== Removing any locally generated guide (will use guide job artifact instead) ==="
          find packages-generated/ -name "*.pdf" -delete
          echo ""
          echo "=== Generated files ==="
          find packages-generated/ -type f -exec ls -lh {} \;
          echo ""
          echo "=== File count ==="
          find packages-generated/ -type f | wc -l | xargs echo "Total files:"

      - name: Upload generated package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.year }}
          retention-days: 1
          path: packages-generated/

      - name: Confirm upload for ${{ matrix.year }}
        run: |
          echo "=== Uploaded artifact: package-${{ matrix.year }} ==="
          echo "Contents:"
          find packages-generated/ -type f -exec echo "  {}" \;

  commit:
    runs-on: ubuntu-24.04
    needs: [discover, generate, guide]
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all generated packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: packages-generated/
          merge-multiple: true

      - name: Download guide PDF
        uses: actions/download-artifact@v8
        with:
          name: bst-guide
          path: target/guide/

      - name: Copy guide into each package directory
        run: |
          echo "=== Copying guide PDF into each package ==="
          GUIDE_FILENAME=$(cat app/templates/bst/meta.toml | grep guide_filename | sed 's/.*= *"//' | sed 's/".*//')
          echo "Guide filename from meta.toml: $GUIDE_FILENAME"
          for dir in packages-generated/*/; do
            cp target/guide/bst-guide.pdf "$dir/$GUIDE_FILENAME"
            echo "  Copied to: $dir$GUIDE_FILENAME ($(ls -lh "$dir$GUIDE_FILENAME" | awk '{print $5}'))"
          done

      - name: List all packages
        run: |
          echo "=== Final package contents ==="
          find packages-generated/ -type d | while read dir; do
            count=$(find "$dir" -maxdepth 1 -type f | wc -l)
            if [ "$count" -gt 0 ]; then
              echo ""
              echo "--- $dir ($count files) ---"
              ls -lh "$dir"
            fi
          done
          echo ""
          echo "=== Total files ==="
          find packages-generated/ -type f | wc -l | xargs echo "Total:"

      - name: Stage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages-generated/
          echo "=== Staged changes ==="
          git diff --staged --stat
          echo ""
          echo "=== Staged files ==="
          git diff --staged --name-only | head -50

      - name: Commit and push
        run: |
          if git diff --staged --quiet; then
            echo "=== No changes to commit ==="
            echo "packages-generated/ is already up to date"
          else
            echo "=== Committing ==="
            git commit -m "Generate BST packages from app/data and app/templates

          Triggered by: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"
            echo ""
            echo "=== Commit details ==="
            git log -1 --stat
            echo ""
            echo "=== Pushing to ${{ github.ref_name }} ==="
            git push
            echo "=== Push complete ==="
          fi
