name: generate-bst
run-name: "generate-bst from ${{ github.ref_name }}"
concurrency:
  group: bst-packages-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/se-*'
      - 'app/templates/bst/**'
      - 'app/templates/meta.toml'
      - 'app/products/bst.js'
      - '.github/workflows/generate-bst.yml'
  workflow_call:
    inputs:
      skip-tests:
        type: boolean
        default: false
      skip-generation:
        type: boolean
        default: false
      skip-reconciliation:
        type: boolean
        default: false
      skip-commit:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip tests'
        type: boolean
        default: false
      skip-generation:
        description: 'Skip generation'
        type: boolean
        default: false
      skip-reconciliation:
        description: 'Skip reconciliation'
        type: boolean
        default: false
      skip-commit:
        description: 'Skip commit'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  params:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: "github.event_name=[${{ github.event_name }}]"
        run: ":"
      - name: "github.ref=[${{ github.ref }}]"
        run: ":"
      - name: "inputs.skip-tests=[${{ inputs.skip-tests }}]"
        run: ":"
      - name: "inputs.skip-generation=[${{ inputs.skip-generation }}]"
        run: ":"
      - name: "inputs.skip-reconciliation=[${{ inputs.skip-reconciliation }}]"
        run: ":"
      - name: "inputs.skip-commit=[${{ inputs.skip-commit }}]"
        run: ":"
      - name: Normalise Params
        id: normalise
        shell: bash
        run: |
          SKIP_TESTS='${{ inputs.skip-tests }}'; [[ -z "$SKIP_TESTS" ]] && SKIP_TESTS="false"
          echo "skip-tests=${SKIP_TESTS}" | tee -a "$GITHUB_OUTPUT"
          SKIP_GENERATION='${{ inputs.skip-generation }}'; [[ -z "$SKIP_GENERATION" ]] && SKIP_GENERATION="false"
          echo "skip-generation=${SKIP_GENERATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_RECONCILIATION='${{ inputs.skip-reconciliation }}'; [[ -z "$SKIP_RECONCILIATION" ]] && SKIP_RECONCILIATION="false"
          echo "skip-reconciliation=${SKIP_RECONCILIATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_COMMIT='${{ inputs.skip-commit }}'; [[ -z "$SKIP_COMMIT" ]] && SKIP_COMMIT="false"
          echo "skip-commit=${SKIP_COMMIT}" | tee -a "$GITHUB_OUTPUT"
    outputs:
      skip-tests: ${{ steps.normalise.outputs.skip-tests }}
      skip-generation: ${{ steps.normalise.outputs.skip-generation }}
      skip-reconciliation: ${{ steps.normalise.outputs.skip-reconciliation }}
      skip-commit: ${{ steps.normalise.outputs.skip-commit }}

  test:
    runs-on: ubuntu-24.04
    needs: [params]
    if: ${{ needs.params.outputs.skip-tests != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  generate:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install pandoc and weasyprint
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends pandoc
          pip install --quiet weasyprint
      - run: rm -rf packages
      - run: npm run generate -- --package bst
      - run: npm test
      - name: Compute reconciliation matrix
        id: matrix
        run: |
          YEAR_ENDS=$(ls -d packages/GB\ Accounts\ Basic\ Sole\ Trader*/ 2>/dev/null \
            | sed 's|.*/GB Accounts Basic Sole Trader \([0-9-]*\).*|\1|' \
            | sort -r \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "year-ends=$YEAR_ENDS" | tee -a "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: bst-packages
          retention-days: 1
          path: packages/
    outputs:
      matrix: ${{ steps.matrix.outputs.year-ends }}

  reconcile:
    runs-on: ubuntu-24.04
    needs: [params, generate]
    if: ${{ !cancelled() && (needs.generate.result == 'success' || needs.generate.result == 'skipped') && needs.params.outputs.skip-reconciliation != 'true' && needs.generate.outputs.matrix != '[]' }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        year-end: ${{ fromJson(needs.generate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install LibreOffice
        timeout-minutes: 5
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libreoffice-calc
      - uses: actions/download-artifact@v8
        with:
          name: bst-packages
          path: packages/
      - run: rm -f reports/*.md
      - run: npm run reconciliation -- --package bst --scenario basic --year-end ${{ matrix.year-end }}
      - run: npm run reconciliation -- --package bst --scenario extended --year-end ${{ matrix.year-end }}
      - name: Generate screenshots
        run: |
          mkdir -p /tmp/screenshots
          for xlsx in reports/populated/*.xlsx; do
            [ -f "$xlsx" ] || continue
            node scripts/enable-print-headers.cjs "$xlsx"
            name=$(basename "$xlsx" .xlsx)
            libreoffice --headless --norestore --calc \
              -env:UserInstallation="file:///tmp/lo_ss_$$" \
              --convert-to pdf --outdir /tmp/screenshots/ "$xlsx" 2>/dev/null || true
            pdf="/tmp/screenshots/${name}.pdf"
            [ -f "$pdf" ] && mv "$pdf" "reports/${name}.pdf"
          done
      - run: rm -rf reports/populated
      - name: Check reconciliation
        run: |
          COUNT=0
          FAIL=0
          for f in reports/*.md; do
            [ -f "$f" ] || continue
            COUNT=$((COUNT + 1))
            if grep "^Status:" "$f" | grep -q "ANOMALYDETECTED"; then FAIL=1; fi
          done
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No reconciliation reports for ${{ matrix.year-end }}"
            exit 1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Reconciliation anomaly for ${{ matrix.year-end }}"
            exit 1
          fi
          echo "$COUNT reports, all RECONCILES"
      - uses: actions/upload-artifact@v7
        with:
          name: bst-reports-${{ matrix.year-end }}
          retention-days: 1
          path: reports/

  commit:
    runs-on: ubuntu-24.04
    needs: [params, generate, reconcile]
    if: ${{ !cancelled() && (needs.reconcile.result == 'success' || needs.reconcile.result == 'skipped') && needs.params.outputs.skip-commit != 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: bst-packages
          path: packages/
      - uses: actions/download-artifact@v8
        with:
          pattern: bst-reports-*
          path: reports/
          merge-multiple: true
      - name: Commit and push
        id: push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf --ignore-unmatch reports/screenshots/ reports/populated/
          git add packages/ reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git diff --staged --name-only | head -50
            git commit -m "Generate BST packages from app/data and app/templates

          Triggered by: ${{ github.sha }}"
            git pull --rebase
            git push
          fi
      - name: Retry push after delay
        if: ${{ steps.push.outcome == 'failure' }}
        run: |
          for i in 5 10 15 20 25 30; do
            echo "Waiting... ${i}s"
            sleep 5
          done
          git pull --rebase
          git push
