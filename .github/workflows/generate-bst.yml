name: generate-bst
run-name: "generate-bst from ${{ github.ref_name }}"

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'app/data/se-*'
      - 'app/templates/bst/**'
      - 'app/templates/meta.toml'
      - 'app/lib/**'
      - 'app/bin/**'
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip pre-generate tests'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  discover:
    runs-on: ubuntu-24.04
    outputs:
      years: ${{ steps.list.outputs.years }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: List tax years
        id: list
        run: |
          years=$(ls app/data/se-*.toml | xargs -I{} basename {} .toml | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "years=$years" >> "$GITHUB_OUTPUT"
          echo "Found tax years: $years"

  test:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip-tests }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sitemaps
        run: node scripts/build-sitemaps.cjs

      - name: Run tests
        run: npm test

  generate:
    runs-on: ubuntu-24.04
    needs: [discover, test]
    if: ${{ !cancelled() && needs.discover.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    strategy:
      matrix:
        year: ${{ fromJson(needs.discover.outputs.years) }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate ${{ matrix.year }}
        run: node app/bin/generate.js --skip-guide --years ${{ matrix.year }}

      - name: Upload generated package
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.year }}
          retention-days: 1
          path: packages-generated/

  commit:
    runs-on: ubuntu-24.04
    needs: [generate]
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all generated packages
        uses: actions/download-artifact@v6
        with:
          pattern: package-*
          path: packages-generated/
          merge-multiple: true

      - name: List generated packages
        run: ls -R packages-generated/

      - name: Commit generated packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages-generated/
          if git diff --staged --quiet; then
            echo "No changes to packages-generated/"
          else
            git commit -m "Generate BST packages from app/data and app/templates

          Triggered by: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"
            git push
          fi
