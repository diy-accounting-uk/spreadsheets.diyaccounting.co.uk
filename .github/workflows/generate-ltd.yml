name: generate-ltd
run-name: "generate-ltd from ${{ github.ref_name }}"
concurrency:
  group: ltd-packages-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '47 4 * * *'
  workflow_dispatch:
  # push trigger disabled 2026-05-07: this workflow self-commits 50-300 generated
  # Excel files per run. Combined with the daily schedule, that produced a high
  # volume of bot-authored mass-file-change commits — a pattern that contributes
  # to GitHub's account-takeover/abuse heuristics. Run via workflow_dispatch or
  # the schedule only until generated artefacts move out of git.
  # push:
  #   branches:
  #     - '**'
  #     - '!gh_pages'
  #   paths:
  #     - 'app/data/ltd-*'
  #     - 'app/templates/ltd/**'
  #     - 'app/templates/meta.toml'
  #     - 'app/products/ltd.js'
  #     - '.github/workflows/generate-ltd.yml'
  workflow_call:
    inputs:
      skip-tests:
        type: boolean
        default: false
      skip-generation:
        type: boolean
        default: false
      skip-reconciliation:
        type: boolean
        default: false
      skip-commit:
        type: boolean
        default: false
      reconcile-all:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip tests'
        type: boolean
        default: false
      skip-generation:
        description: 'Skip generation'
        type: boolean
        default: false
      skip-reconciliation:
        description: 'Skip reconciliation'
        type: boolean
        default: false
      skip-commit:
        description: 'Skip commit'
        type: boolean
        default: false
      reconcile-all:
        description: 'Reconcile all packages (not just latest 24 months)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  params:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: "github.event_name=[${{ github.event_name }}]"
        run: ":"
      - name: "github.ref=[${{ github.ref }}]"
        run: ":"
      - name: "inputs.skip-tests=[${{ inputs.skip-tests }}]"
        run: ":"
      - name: "inputs.skip-generation=[${{ inputs.skip-generation }}]"
        run: ":"
      - name: "inputs.skip-reconciliation=[${{ inputs.skip-reconciliation }}]"
        run: ":"
      - name: "inputs.skip-commit=[${{ inputs.skip-commit }}]"
        run: ":"
      - name: "inputs.reconcile-all=[${{ inputs.reconcile-all }}]"
        run: ":"
      - name: Normalise Params
        id: normalise
        shell: bash
        run: |
          SKIP_TESTS='${{ inputs.skip-tests }}'; [[ -z "$SKIP_TESTS" ]] && SKIP_TESTS="false"
          echo "skip-tests=${SKIP_TESTS}" | tee -a "$GITHUB_OUTPUT"
          SKIP_GENERATION='${{ inputs.skip-generation }}'; [[ -z "$SKIP_GENERATION" ]] && SKIP_GENERATION="false"
          echo "skip-generation=${SKIP_GENERATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_RECONCILIATION='${{ inputs.skip-reconciliation }}'; [[ -z "$SKIP_RECONCILIATION" ]] && SKIP_RECONCILIATION="false"
          echo "skip-reconciliation=${SKIP_RECONCILIATION}" | tee -a "$GITHUB_OUTPUT"
          SKIP_COMMIT='${{ inputs.skip-commit }}'; [[ -z "$SKIP_COMMIT" ]] && SKIP_COMMIT="false"
          echo "skip-commit=${SKIP_COMMIT}" | tee -a "$GITHUB_OUTPUT"
          RECONCILE_ALL='${{ inputs.reconcile-all }}'; [[ -z "$RECONCILE_ALL" ]] && RECONCILE_ALL="false"
          echo "reconcile-all=${RECONCILE_ALL}" | tee -a "$GITHUB_OUTPUT"
    outputs:
      skip-tests: ${{ steps.normalise.outputs.skip-tests }}
      skip-generation: ${{ steps.normalise.outputs.skip-generation }}
      skip-reconciliation: ${{ steps.normalise.outputs.skip-reconciliation }}
      skip-commit: ${{ steps.normalise.outputs.skip-commit }}
      reconcile-all: ${{ steps.normalise.outputs.reconcile-all }}

  test:
    runs-on: ubuntu-24.04
    needs: [params]
    if: ${{ needs.params.outputs.skip-tests != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci || sleep 30 && npm ci
      - run: npm test

  generate:
    runs-on: ubuntu-24.04
    needs: [params, test]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.params.outputs.skip-generation != 'true' }}
    timeout-minutes: 60
    outputs:
      matrix: ${{ steps.matrix.outputs.year-ends }}
      latest: ${{ steps.matrix.outputs.latest }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci || sleep 30 && npm ci
      - name: Install pandoc and weasyprint
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends pandoc
          pip install --quiet weasyprint
      - run: rm -rf packages
      - run: npm run generate -- --package ltd
      - run: npm test
      - name: Compute reconciliation matrix
        id: matrix
        env:
          RECONCILE_ALL: ${{ needs.params.outputs.reconcile-all }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          ALL_YEAR_ENDS=$(ls -d packages/GB\ Accounts\ Company*/ 2>/dev/null \
            | sed 's|.*/GB Accounts Company \([0-9-]*\).*|\1|' \
            | sort -r)
          if [[ "$RECONCILE_ALL" == "true" ]]; then
            YEAR_ENDS=$(echo "$ALL_YEAR_ENDS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            YEAR_ENDS=$(echo "$ALL_YEAR_ENDS" \
              | head -24 \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "year-ends=$YEAR_ENDS" | tee -a "$GITHUB_OUTPUT"
          LATEST=$(echo "$ALL_YEAR_ENDS" | head -1)
          echo "latest=$LATEST" | tee -a "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ltd-packages
          retention-days: 1
          path: packages/

  reconcile:
    runs-on: ubuntu-24.04
    needs: [params, generate]
    if: ${{ !cancelled() && (needs.generate.result == 'success' || needs.generate.result == 'skipped') && needs.params.outputs.skip-reconciliation != 'true' && needs.generate.outputs.matrix != '[]' }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        year-end: ${{ fromJson(needs.generate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci || sleep 30 && npm ci
      - name: Install LibreOffice
        timeout-minutes: 5
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libreoffice-calc
      - uses: actions/download-artifact@v8
        with:
          name: ltd-packages
          path: packages/
      - run: rm -f reports/*.md
      - run: npm run reconciliation -- --package ltd --scenario full --year-end ${{ matrix.year-end }}
      - name: Copy latest populated to examples
        if: ${{ matrix.year-end == needs.generate.outputs.latest }}
        run: |
          rm -rf examples/ltd-latest
          POPULATED=$(ls -d reports/populated/*ltd-scenario-full 2>/dev/null | head -1)
          if [ -d "$POPULATED" ]; then
            cp -r "$POPULATED" examples/ltd-latest
            echo "Copied $POPULATED to examples/ltd-latest"
          fi
      - run: rm -rf reports/populated
      - uses: actions/upload-artifact@v7
        with:
          name: ltd-reports-${{ matrix.year-end }}
          retention-days: 1
          path: reports/
      - uses: actions/upload-artifact@v7
        if: ${{ matrix.year-end == needs.generate.outputs.latest }}
        with:
          name: ltd-examples
          retention-days: 1
          path: examples/
      - name: Check reconciliation
        run: |
          COUNT=0
          FAIL=0
          for f in reports/*.md; do
            [ -f "$f" ] || continue
            COUNT=$((COUNT + 1))
            if grep "^Status:" "$f" | grep -q "ANOMALYDETECTED"; then FAIL=1; fi
          done
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No reconciliation reports for ${{ matrix.year-end }}"
            exit 1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Reconciliation anomaly for ${{ matrix.year-end }}"
            exit 1
          fi
          echo "$COUNT reports, all RECONCILES"

  reconcile-extra:
    runs-on: ubuntu-24.04
    needs: [params, generate, reconcile]
    if: ${{ !cancelled() && needs.reconcile.result == 'success' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci || sleep 30 && npm ci
      - name: Install LibreOffice
        timeout-minutes: 5
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends libreoffice-calc
      - uses: actions/download-artifact@v8
        with:
          name: ltd-packages
          path: packages/
      - run: rm -f reports/*.md
      - name: Reconcile extra scenarios against latest package
        run: npm run reconciliation -- --package ltd --scenario brickwork-pro-nonvat --year-end ${{ needs.generate.outputs.latest }}
      - uses: actions/upload-artifact@v7
        with:
          name: ltd-extra-reports
          retention-days: 1
          path: reports/
      - name: Check extra reconciliation
        run: |
          COUNT=0
          FAIL=0
          for f in reports/*.md; do
            [ -f "$f" ] || continue
            COUNT=$((COUNT + 1))
            if grep "^Status:" "$f" | grep -q "ANOMALYDETECTED"; then FAIL=1; fi
          done
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::No extra reconciliation reports"
          elif [ "$FAIL" -eq 1 ]; then
            echo "::warning::Extra reconciliation anomaly (non-blocking)"
          else
            echo "$COUNT extra reports, all RECONCILES"
          fi

  commit:
    runs-on: ubuntu-24.04
    needs: [params, generate, reconcile, reconcile-extra]
    if: ${{ !cancelled() && (needs.reconcile.result == 'success' || needs.reconcile.result == 'skipped') && needs.params.outputs.skip-commit != 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: ltd-packages
          path: packages/
      - uses: actions/download-artifact@v8
        with:
          pattern: ltd-reports-*
          path: reports/
          merge-multiple: true
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ltd-examples
          path: examples/
      - name: Commit and push
        id: push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf --ignore-unmatch reports/screenshots/ reports/populated/
          git add packages/ reports/ examples/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git diff --staged --name-only | head -50
            git commit -m "Generate Ltd Company packages from app/data and app/templates

          Triggered by: ${{ github.sha }}"
            git pull --rebase
            git push
          fi
      - name: Retry push after delay
        if: ${{ steps.push.outcome == 'failure' }}
        run: |
          for i in 5 10 15 20 25 30; do
            echo "Waiting... ${i}s"
            sleep 5
          done
          git pull --rebase
          git push
