name: reconciliation
run-name: "reconciliation from ${{ github.ref_name }}"
concurrency:
  group: reconciliation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - 'packages-generated/**'
      - 'app/test/fixtures/**'
      - 'app/data/**'
      - 'app/lib/scenario-loader.js'
      - 'app/lib/spreadsheet-runner.js'
      - 'app/bin/reconcile.js'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:

  reconcile:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout latest
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install LibreOffice
        run: |
          echo "=== Installing LibreOffice Calc ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq libreoffice-calc
          libreoffice --version

      - name: Run reconciliation
        id: reconcile
        continue-on-error: true
        run: |
          echo "=== Running reconciliation ==="
          npm run reconciliation 2>&1 | tee reconciliation.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: List generated reports
        if: ${{ !cancelled() }}
        run: |
          echo "=== Generated reports ==="
          if [ -d reports ]; then
            ls -lh reports/
            echo ""
            echo "=== Report contents ==="
            for f in reports/*.md; do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done
          else
            echo "No reports generated"
          fi

      - name: Generate screenshots (empty PDFs from as-generated spreadsheets)
        if: ${{ !cancelled() }}
        run: |
          echo "=== Generating empty screenshots ==="
          mkdir -p /tmp/screenshots

          echo ""
          echo "--- Single-file products (BST, Taxi) ---"
          for xlsx in packages-generated/*/Financialaccountsto*.xlsx packages-generated/*/Financialaccountsyearto*.xlsx; do
            [ -f "$xlsx" ] || continue
            name=$(basename "$(dirname "$xlsx")" | sed 's/ /_/g')
            echo "  Processing: $xlsx"
            libreoffice --headless --norestore --calc \
              -env:UserInstallation="file:///tmp/lo_screenshots_empty_$$" \
              --convert-to pdf --outdir "/tmp/screenshots" "$xlsx" 2>/dev/null || true
            pdf="/tmp/screenshots/$(basename "${xlsx%.xlsx}.pdf")"
            if [ -f "$pdf" ]; then
              cp "$pdf" "reports/${name}_empty.pdf"
              echo "    Saved: reports/${name}_empty.pdf"
              rm "$pdf"
            fi
          done

          echo ""
          echo "--- Multi-file products (SE) ---"
          for dir in packages-generated/GB\ Accounts\ Self\ Employed*/; do
            [ -d "$dir" ] || continue
            fa="$dir/Financialaccounts.xlsx"
            [ -f "$fa" ] || continue
            name=$(basename "$dir" | sed 's/ /_/g')
            echo "  Processing: $fa"
            libreoffice --headless --norestore --calc \
              -env:UserInstallation="file:///tmp/lo_screenshots_empty_$$" \
              --convert-to pdf --outdir "/tmp/screenshots" "$fa" 2>/dev/null || true
            pdf="/tmp/screenshots/Financialaccounts.pdf"
            if [ -f "$pdf" ]; then
              cp "$pdf" "reports/${name}_empty.pdf"
              echo "    Saved: reports/${name}_empty.pdf"
              rm "$pdf"
            fi
          done

          echo ""
          echo "=== Screenshots ==="
          find reports/ -name "*_empty.pdf" -exec ls -lh {} \; 2>/dev/null || echo "No screenshots generated"

      - name: Commit reports and screenshots
        if: ${{ !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up old directory structure
          git rm -rf --ignore-unmatch reports/screenshots/ reports/populated/
          rm -rf reports/screenshots/ reports/populated/
          git add reports/
          if git diff --staged --quiet; then
            echo "=== No changes to commit ==="
            echo "reports/ is already up to date"
          else
            echo "=== Staged ==="
            git diff --staged --name-only | head -50
            git commit -m "Reconciliation reports and screenshots

          Triggered by: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"
            echo "=== Pushing to ${{ github.ref_name }} ==="
            git pull --rebase
            git push
            echo "=== Push complete ==="
          fi

      - name: Check compliance
        if: ${{ !cancelled() }}
        run: |
          echo "=== Checking compliance ==="
          if grep -r "NON-COMPLIANT" reports/*.md 2>/dev/null; then
            echo "::error::Reconciliation found non-compliant packages"
            exit 1
          else
            echo "All packages compliant"
          fi
