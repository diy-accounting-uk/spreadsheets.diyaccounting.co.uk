# === EXPECTED RESULTS ===
# 180 working days x varying daily fares = 38,000 total sales
# 20,000 total business miles
# Mileage allowance: 10,000 x 0.45 + 10,000 x 0.25 = 7,000
# Vehicle costs: fuel 2,708 + insurance 1,400 + road tax 180 + repairs 580 = 4,868
# Mileage (7,000) > vehicle costs (4,868), so mileage is used
# Non-vehicle expenses: admin 420 + legal 750 + advertising 150 + dashcam 200 = 1,520
# Net profit: 38,000 - 7,000 - 1,520 = ~29,480

[expected]
total_sales = 38000
