# === EXPECTED RESULTS ===
# Calculated using 2025-26 tax rates

[expected]
total_sales = 36000
total_premises = 4800
total_gen_admin = 480
total_legal = 850
total_fixed_assets = 1200
total_expenses_ex_cogs = 6130      # 4800 + 480 + 850
gross_profit = 36000               # no cost of sales (no stock)
net_profit = 29870                 # 36000 - 6130

# Income Tax sheet uses SE Short D106 which is net profit (29870).
# Capital allowances (AIA on laptop) are handled on SE Short boxes 22-23
# but do NOT reduce the figure used by Income Tax E5 in this template.
# So taxable profit for Income Tax = net_profit = 29870.

# Income tax (2025-26 rates)
personal_allowance = 12570
taxable_income = 17300             # 29870 - 12570
income_tax = 3460                  # 17300 × 20%

# NI Class 4 (2025-26 rates: 6% on 12570-50270)
ni_class4_lower = 1038             # (29870 - 12570) × 6% = 1038
ni_class4_upper = 0                # below upper limit
total_tax_and_ni = 4498            # 3460 + 1038
