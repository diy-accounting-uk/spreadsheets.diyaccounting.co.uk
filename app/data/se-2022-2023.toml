# Source: HMRC
# Extracted from: packages/GB Accounts Basic Sole Trader 2023-04-05 (Apr23)
# Note: NI rates include the Health and Social Care Levy (1.25% addition)
# which was introduced in April 2022 and reversed in November 2022.
# The spreadsheet uses the blended rate for the full year: 9.73% and 2.73%.

