# UK Limited Company tax rates and thresholds for Financial Year 2021
# (1 April 2021 - 31 March 2022)
# Source: HMRC - https://www.gov.uk/government/publications/rates-and-allowances-corporation-tax/rates-and-allowances-corporation-tax

[financial_year]
