[product]
id = "ltd"
name = "Company"
description = "Limited company accounts package (all year-end months). Supports small profits rate only (profits up to 50000)."
tax_regime = "ltd"

[template]
files = [
  "Financialaccounts.xlsx",
  "Sales.xlsx",
  "Purchases.xlsx",
  "Currentaccount.xlsx",
  "Savingaccount.xlsx",
  "Cashaccount.xlsx",
  "Creditcardaccount.xlsx",
  "Payslips.xlsx",
  "Salesinvoice.xlsx",
  "expensesform.xlsx",
  "Dividend Voucher.docx",
]
guide = "ltd-guide.md"
payslip_guide = "payslip-guide.md"

[output]
dir_pattern = "{prefix} {name} {year_end_date} ({short_label}) {format}"
guide_filename = "Company Accounts User Guide.pdf"
payslip_guide_filename = "Payslip User Guide.pdf"

[sheets.financialaccounts]
admin = "xl/worksheets/sheet12.xml"
cellEditFn = "ltd"
vatQtr1 = "xl/worksheets/sheet22.xml"
vatQtr2 = "xl/worksheets/sheet23.xml"
vatQtr3 = "xl/worksheets/sheet24.xml"
vatQtr4 = "xl/worksheets/sheet25.xml"
vatQtr5 = "xl/worksheets/sheet26.xml"

[sheets.payslips]
payslipsAdmin = "xl/worksheets/sheet16.xml"
