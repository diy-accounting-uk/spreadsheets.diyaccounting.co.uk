[product]
id = "se"
name = "Self Employed"
description = "Full bookkeeping package for self-employed businesses. Includes sales, purchases, bank, cash, VAT returns, payroll, fixed assets, and invoicing."
tax_regime = "se"

[template]
files = [
  "Financialaccounts.xlsx",
  "Sales.xlsx",
  "Purchases.xlsx",
  "Bank.xlsx",
  "Cash.xlsx",
  "Vat.xlsx",
  "Payslips.xlsx",
  "Fixedassets.xlsx",
  "Salesinvoice.xlsx",
]
guide = "se-guide.md"
payslip_guide = "payslip-guide.md"

[output]
dir_pattern = "{prefix} {name} {year_end_date} ({short_label}) {format}"
guide_filename = "Self Employed User Guide.pdf"
payslip_guide_filename = "Payslip User Guide.pdf"

[sheets.financialaccounts]
admin = "xl/worksheets/sheet10.xml"
cellEditFn = "se"

[sheets.vat]
vatQtr1 = "xl/worksheets/sheet1.xml"
vatQtr2 = "xl/worksheets/sheet2.xml"
vatQtr3 = "xl/worksheets/sheet3.xml"
vatQtr4 = "xl/worksheets/sheet4.xml"
vatQtr5 = "xl/worksheets/sheet5.xml"

[sheets.payslips]
payslipsAdmin = "xl/worksheets/sheet16.xml"
